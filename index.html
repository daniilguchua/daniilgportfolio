<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Test Vanta</title>
    <!-- Three.js (required by Vanta) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
    <!-- Vanta Waves -->
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.waves.min.js"></script>
    <style>
      html, body { margin:0; padding:0; height: 100%; }
      #vanta-bg {
        width: 100%;
        height: 100%;
        position: fixed;
        top:0; left:0;
        z-index: -1;
      }
      h1 { color: white; text-align: center; margin-top: 50px; }
    </style>
  </head>
  <body>
    <div id="vanta-bg"></div>
    <h1>Hello from Vanta</h1>

    <script>
      VANTA.WAVES({
        el: "#vanta-bg",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        color: 0x70714
      })
    </script>
  </body>
</html>
